identifiers:
  cnames:
  - type: word
    value: pantheonsite.io
  ips: []
  nameservers: []
  not_cnames: []
matcher_rule:
  matchers:
  - dsl:
    - Host != ip
    type: dsl
  - condition: and
    part: body
    type: word
    words:
    - Unknown site
    - The page could not be loaded properly.
  - status: 404
    type: status
  matchers-condition: and
mode: http
service_name: Pantheon Takeover Detection
source: nucleitemplates
