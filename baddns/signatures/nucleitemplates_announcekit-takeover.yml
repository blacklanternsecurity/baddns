identifiers:
  cnames: []
  ips: []
  nameservers: []
  not_cnames: []
matcher_rule:
  matchers:
  - dsl:
    - Host != ip
    type: dsl
  - condition: and
    part: body
    type: word
    words:
    - Error 404 - AnnounceKit
  - status: 404
    type: status
  matchers-condition: and
mode: http
negative_signature: false
service_name: Announcekit Takeover Detection
source: nucleitemplates
