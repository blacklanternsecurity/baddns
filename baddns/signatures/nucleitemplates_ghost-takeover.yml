identifiers:
  cnames: []
  ips: []
  nameservers: []
  not_cnames: []
matcher_rule:
  matchers:
  - dsl:
    - Host != ip
    type: dsl
  - condition: or
    part: header
    type: word
    words:
    - error.ghost.org
    - offline.ghost.org
  - status: 302
    type: status
  matchers-condition: and
mode: http
negative_signature: false
service_name: ghost takeover detection
source: nucleitemplates
